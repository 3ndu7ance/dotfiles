# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

monitor=DP-1,1920x1080@144,0x0,1

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = nautilus
$menu = hyprlauncher
$editor = nvim
$notifications = dunst
$browser = brave

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = $menu --daemon
exec-once = hyprpaper
exec-once = protonvpn-app
exec-once = $notifications
exec-once = hypridle

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME, rose-pine-hyprcursor

###################
### PERMISSIONS ###
###################

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2

    #TODO think about colors
    col.active_border = rgb(d3134b) 
    col.inactive_border = rgba(595959aa)

    no_focus_fallback = true
    resize_on_border = false

    allow_tearing = true

    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 6

    active_opacity = 1
    inactive_opacity = 0.9

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeInOutCubic, popin 50%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    focus_on_activate = false
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

xwayland {
    force_zero_scaling = true
}

group {
    col.border_active = rgb(d3134b)
    col.border_inactive = rgba(595959aa)

    groupbar {
        font_size = 11
        gradients = true
        text_color = rgb(ffffff)
        col.active = rgb(d3134b)
        col.inactive = rgba(595959aa)
    }
}


#############
### INPUT ###
#############

input {
    kb_layout = us,ua
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1

    sensitivity = -0.8
    accel_profile = flat
}

#device {
#
#
#}


###################
### RENDER ###
###################

render {
    direct_scanout = 2
}

cursor {
    min_refresh_rate = 144
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, N, exec, $terminal -e $editor
bind = $mainMod, C, killactive,
bind = $mainMod CTRL SHIFT, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, togglesplit, # dwindle
bind = $mainMod, F, fullscreen,
bind = $mainMod, B, exec, $browser
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod, A, centerwindow,
bind = $mainMod SHIFT, P, pin,

# Window groups (tabbed)
bind = $mainMod, G, togglegroup,
bind = $mainMod, bracketleft, changegroupactive, b
bind = $mainMod, bracketright, changegroupactive, f

# Resize submap (SUPER+R conflicts with menu, using SUPER+SHIFT+R)
bind = $mainMod SHIFT, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , L, resizeactive, 40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40
binde = , left, resizeactive, -40 0
binde = , right, resizeactive, 40 0
binde = , up, resizeactive, 0 -40
binde = , down, resizeactive, 0 40
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Move focus (vim keys + arrow keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move tiled windows around their layout
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7 
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod, grave, workspace, previous

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots: save to file, copy to clipboard, notify
# Print              -> full screen
# SHIFT+Print        -> region select
# CTRL+Print         -> active window
bind = , Print, exec, F=~/Pictures/Screenshots/$(date +'%s_grim.png') && grim "$F" && wl-copy < "$F" && notify-send "Screenshot" "Saved $F"
bind = SHIFT, Print, exec, F=~/Pictures/Screenshots/$(date +'%s_grim.png') && grim -g "$(slurp)" "$F" && wl-copy < "$F" && notify-send "Screenshot" "Saved region to $F"
bind = CTRL, Print, exec, F=~/Pictures/Screenshots/$(date +'%s_grim.png') && grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" "$F" && wl-copy < "$F" && notify-send "Screenshot" "Saved window to $F"

# Color picker (requires hyprpicker — install with: pacman -S hyprpicker)
# bind = $mainMod, X, exec, hyprpicker -a -n

# Brightness Control
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Volume Control
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Audio playback control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- ProtonVPN: small floating panel pinned to top-right ---
windowrule = float on, match:class protonvpn-app
windowrule = size 800 600, match:class protonvpn-app
windowrule = move 1297 71, match:class protonvpn-app
windowrule = rounding 6, match:class protonvpn-app

# --- pavucontrol: floating mixer ---
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = size 600 600, match:class org.pulseaudio.pavucontrol
windowrule = move 1310 100, match:class org.pulseaudio.pavucontrol

# --- CS2: tearing + game content type (let game manage its own fullscreen) ---
windowrule = immediate on, match:class cs2
windowrule = content game, match:class cs2

# --- Common floating windows (PiP + standard XDG portal pickers) ---
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Picture in picture)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = pin on, match:title ^(Picture-in-Picture)$

# --- Smart gaps: kill borders/rounding when only one tiled window is visible ---
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# --- Magic special workspace: spawn floating centered terminal when empty ---
workspace = special:magic, on-created-empty:[float; size 1200 800; center] $terminal
