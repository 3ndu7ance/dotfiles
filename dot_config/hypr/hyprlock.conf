# Green Japanese theme configuration
general {
    disable_loading_bar = true
    grace = 300
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/hyprlock_bg.jpg
    blur_passes = 1
    blur_size = 4
    noise = 0.01
    contrast = 1.1
    brightness = 0.6
    vibrancy = 0.3
    vibrancy_darkness = 0.2
}

# Password input field with green theme
input-field {
    monitor =
    font_family = JetBrains Mono SemiBold
    size = 270, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = false
    dots_rounding = -1
    outer_color = rgb(123, 181, 108)
    inner_color = rgba(152, 212, 138, 0.6)
    font_color = rgb(46, 63, 67)
    fade_on_empty = true
    fade_timeout = 1000
    hide_input = false
    rounding = 12
    check_color = rgb(76, 175, 80)
    fail_color = rgb(244, 67, 54)
    fail_text = <i>Attempts: ($ATTEMPTS)</i>
    fail_timeout = 2000
    fail_transition = 300
    capslock_color = rgb(43, 20, 77)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false

    position = 0, -20
    halign = center
    valign = center
}

# greetings
label {
    monitor =
    text = $USER
    color = rgba(148, 207, 222, 1)
    font_size = 24 
    font_family = JetBrains Mono SemiBold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
    shadow_color = rgba(27, 94, 32, 0.8)
}

# Time display
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(148, 207, 222, 1)
    font_family = JetBrains Mono SemiBold
    font_size = 56
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
    shadow_color = rgba(27, 94, 32, 0.8)
}

# date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d"
    color = rgba(148, 207, 222, 1)
    font_size = 28
    font_family = JetBrains Mono SemiBold
    position = -50, 50
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
    shadow_color = rgba(27, 94, 32, 0.8)
}

#keyboard layout
label {
    monitor =
    text = $LAYOUT
    font_family = JetBrains Mono SemiBold
    font_size = 10
    halign = left
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
    shadow_color = rgba(27, 94, 32, 0.8)
    position = 10, 10
}
